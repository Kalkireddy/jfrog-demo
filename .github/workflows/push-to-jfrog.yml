name: Build and Push to JFrog

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure insecure registry
        run: |
          echo '{"insecure-registries": ["a254b4d2f38aa4600af769e24eb6003a-729136038.us-east-1.elb.amazonaws.com:8082"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Debug registry endpoint
        run: |
          curl -v http://a254b4d2f38aa4600af769e24eb6003a-729136038.us-east-1.elb.amazonaws.com:8082/v2/ || true

      - name: Login to JFrog Artifactory
        run: |
          echo "${{ secrets.ARTIFACTORY_PASSWORD }}" | docker login \
            a254b4d2f38aa4600af769e24eb6003a-729136038.us-east-1.elb.amazonaws.com:8082 \
            -u ${{ secrets.ARTIFACTORY_USER }} \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t \
            a254b4d2f38aa4600af769e24eb6003a-729136038.us-east-1.elb.amazonaws.com:8082/docker-local/my-app:${{ github.sha }} .

      - name: Push Docker Image to Artifactory
        run: |
          docker push \
            a254b4d2f38aa4600af769e24eb6003a-729136038.us-east-1.elb.amazonaws.com:8082/docker-local/my-app:${{ github.sha }}