name: Build and Push to JFrog

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure insecure registry
        run: |
          REGISTRY=$(echo "${{ secrets.ARTIFACTORY_REGISTRY }}" | tr -d '[:space:]')
          echo "{\"insecure-registries\": [\"${REGISTRY}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Login to JFrog Artifactory
        run: |
          REGISTRY=$(echo "${{ secrets.ARTIFACTORY_REGISTRY }}" | tr -d '[:space:]')
          echo "${{ secrets.ARTIFACTORY_PASSWORD }}" | docker login \
            ${REGISTRY} \
            -u ${{ secrets.ARTIFACTORY_USER }} \
            --password-stdin

      - name: Build Docker Image
        run: |
          REGISTRY=$(echo "${{ secrets.ARTIFACTORY_REGISTRY }}" | tr -d '[:space:]')
          docker build -t ${REGISTRY}/docker-local/my-app:${{ github.sha }} .

      - name: Push Docker Image to Artifactory
        run: |
          REGISTRY=$(echo "${{ secrets.ARTIFACTORY_REGISTRY }}" | tr -d '[:space:]')
          docker push ${REGISTRY}/docker-local/my-app:${{ github.sha }}
