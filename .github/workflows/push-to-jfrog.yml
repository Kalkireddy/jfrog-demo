name: Build and Push to JFrog

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure insecure registry
        run: |
          echo '{"insecure-registries": ["${{ secrets.ARTIFACTORY_REGISTRY }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Login to JFrog Artifactory
        run: |
          echo "${{ secrets.ARTIFACTORY_PASSWORD }}" | docker login \
            ${{ secrets.ARTIFACTORY_REGISTRY }} \
            -u ${{ secrets.ARTIFACTORY_USER }} \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t \
            ${{ secrets.ARTIFACTORY_REGISTRY }}/docker-local/my-app:${{ github.sha }} .

      - name: Push Docker Image to Artifactory
        run: |
          docker push \
            ${{ secrets.ARTIFACTORY_REGISTRY }}/docker-local/my-app:${{ github.sha }}
