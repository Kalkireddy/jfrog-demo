name: Build and Push to JFrog

on:
  push:
    branches: [main]

env:
  ARTIFACTORY_URL: http://artifactory-main-artifactory-nginx-jfrog-main.apps.ncluster.sujeetopenshift.store
  REPO: docker-local
  IMAGE_NAME: my-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Save image and push to JFrog Artifactory
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} | gzip > image.tar.gz
          curl -f \
            -u "${{ secrets.ARTIFACTORY_USER }}:${{ secrets.ARTIFACTORY_PASSWORD }}" \
            -H "X-Checksum-Sha256:$(sha256sum image.tar.gz | awk '{print $1}')" \
            -X PUT \
            --data-binary @image.tar.gz \
            "$ARTIFACTORY_URL/artifactory/$REPO/$IMAGE_NAME/${{ github.sha }}/image.tar.gz"

      - name: Verify artifact in Artifactory
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.ARTIFACTORY_USER }}:${{ secrets.ARTIFACTORY_PASSWORD }}" \
            "$ARTIFACTORY_URL/artifactory/$REPO/$IMAGE_NAME/${{ github.sha }}/image.tar.gz")
          echo "Verification status: $HTTP"
          [ "$HTTP" = "200" ] && echo "SUCCESS: image verified in Artifactory" || (echo "FAIL: got $HTTP" && exit 1)
