name: Build and Push to JFrog

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure insecure registry
        run: |
          echo '{"insecure-registries": ["a00ea4b1f84514909afa11a4089d74ed-733492917.us-east-1.elb.amazonaws.com"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Login to JFrog Artifactory
        run: |
          echo "${{ secrets.ARTIFACTORY_PASSWORD }}" | docker login \
            a00ea4b1f84514909afa11a4089d74ed-733492917.us-east-1.elb.amazonaws.com \
            -u ${{ secrets.ARTIFACTORY_USER }} \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t \
            a00ea4b1f84514909afa11a4089d74ed-733492917.us-east-1.elb.amazonaws.com/docker-local/my-app:${{ github.sha }} .

      - name: Push Docker Image to Artifactory
        run: |
          docker push \
            a00ea4b1f84514909afa11a4089d74ed-733492917.us-east-1.elb.amazonaws.com/docker-local/my-app:${{ github.sha }}